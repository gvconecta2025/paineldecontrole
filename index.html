<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando | PetLojas (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .active-project { border-color: #3b82f6 !important; background-color: #1e293b !important; opacity: 1 !important; }
        .active-link { border-color: #10b981 !important; background-color: #1e293b !important; }
        
        /* Loader Visual */
        #cloud-loader { display: flex; }
        .hidden-loader { display: none !important; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-[#0F172A] text-slate-200 flex flex-col">

    <header class="w-full px-6 py-4 flex justify-between items-center bg-[#1E293B] border-b border-slate-700/50 shadow-md z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-rocket text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">Painel de Comando</h1>
                <p class="text-slate-400 text-xs">Encontre tudo em um só lugar</p>
            </div>
        </div>
        <div class="text-right flex flex-col items-end gap-1">
            <div class="flex items-center gap-2">
                <i id="cloud-status-icon" class="fas fa-cloud-upload-alt text-slate-500 text-xs"></i>
                <span id="cloud-status-text" class="bg-slate-700 text-slate-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider">Conectando...</span>
            </div>
            <div class="text-xs text-slate-400">v6.1 • Firebase Ativado</div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-[1800px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden relative">
        
        <div id="cloud-loader" class="absolute inset-0 bg-[#0F172A]/90 backdrop-blur-sm z-40 flex-col items-center justify-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-slate-300 font-medium tracking-wide">Sincronizando com a Nuvem...</p>
        </div>

        <section class="lg:col-span-2 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-4 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Ferramentas</h3>
                <button onclick="openToolModal()" class="w-7 h-7 bg-purple-600 hover:bg-purple-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-purple-600/20">
                    <i class="fas fa-plus text-[10px]"></i>
                </button>
            </div>
            <div id="tools-list" class="p-3 flex-1 overflow-y-auto space-y-2"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Meus Projetos</h3>
                <button onclick="openProjectModal()" class="w-8 h-8 bg-blue-600 hover:bg-blue-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-blue-600/20">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>
            <div id="project-list" class="p-4 flex-1 overflow-y-auto space-y-3"></div>
        </section>

        <section class="lg:col-span-4 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-6 border-b border-slate-700/50 shrink-0 flex justify-between items-start">
                <div class="overflow-hidden">
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold uppercase tracking-wider">Projeto Ativo</span>
                    <h2 id="active-project-name" class="text-2xl font-bold text-white mt-2 truncate">---</h2>
                    <p id="active-project-subtitle" class="text-xs text-slate-400 mt-1 truncate">---</p>
                </div>
                <button onclick="openLinkModal()" class="w-10 h-10 bg-green-600 hover:bg-green-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-green-600/20 shrink-0 ml-2">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="links-list" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <div class="overflow-hidden pr-2">
                    <h3 class="font-bold text-white flex items-center gap-2 text-sm truncate">
                        <i class="fas fa-book text-amber-500"></i> Caderneta
                    </h3>
                    <p id="active-link-name" class="text-[10px] text-slate-400 mt-1 truncate">Selecione um subprojeto...</p>
                </div>
                <button id="add-note-btn" onclick="openNoteModal()" class="w-8 h-8 bg-amber-600 hover:bg-amber-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-amber-600/20 hidden shrink-0">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto">
                <div id="notebook-container" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="tool-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-sm p-6">
            <h2 id="tool-modal-title" class="text-xl font-bold text-white mb-6">Nova Ferramenta</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-tool-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome</label><input type="text" id="tool-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Link)</label><input type="text" id="tool-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('tool-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveTool()" class="px-6 py-2 bg-purple-600 text-white rounded-lg font-bold">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <div id="project-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="project-modal-title" class="text-xl font-bold text-white mb-6">Novo Projeto</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-project-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome do Projeto</label><input type="text" id="proj-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Subtítulo / Descrição</label><input type="text" id="proj-sub-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('project-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveProject()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <div id="link-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="link-modal-title" class="text-xl font-bold text-white mb-6">Novo Subprojeto (Link)</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-link-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Título</label><input type="text" id="link-title-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Endereço)</label><input type="text" id="link-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Descrição Curta</label><input type="text" id="link-desc-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('link-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveLink()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <div id="note-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="note-modal-title" class="text-xl font-bold text-white mb-6">Nova Anotação</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-note-index">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Tipo</label>
                        <select id="note-type" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm appearance-none">
                            <option value="task">Tarefa</option>
                            <option value="note">Texto Livre</option>
                            <option value="reminder">Lembrete</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Urgência</label>
                        <select id="note-urgency" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm appearance-none">
                            <option value="normal">Normal</option>
                            <option value="high" class="text-red-400">Alta Urgência</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Importância</label>
                        <select id="note-importance" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm appearance-none">
                            <option value="normal">Normal</option>
                            <option value="high" class="text-amber-400">Alta Importância</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Conteúdo</label>
                    <textarea id="note-content" rows="3" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm resize-none"></textarea>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('note-modal')" class="px-4 py-2 text-slate-400 text-sm">Cancelar</button>
                <button onclick="saveNote()" class="px-6 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg font-bold text-sm">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO FIREBASE (Suas chaves integradas)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBA1ed_R66E_UFpFw-irpPtwSSIQvhy9jY",
            authDomain: "painel-de-controle-3f7d8.firebaseapp.com",
            projectId: "painel-de-controle-3f7d8",
            storageBucket: "painel-de-controle-3f7d8.firebasestorage.app",
            messagingSenderId: "234342271805",
            appId: "1:234342271805:web:df8c5476c11cb6ab1d1354"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Referência do documento único onde salvaremos tudo deste painel
        const dashboardRef = db.collection('petlojas_admin').doc('painel_central');

        // ==========================================
        // 2. VARIÁVEIS GLOBAIS E SINCRONIZAÇÃO
        // ==========================================
        let tools = [];
        let projects = [];
        let activeProjectIdx = null;
        let activeLinkIdx = null;

        // Função Mestra para Salvar tudo no Firebase
        function saveToCloud() {
            const statusIcon = document.getElementById('cloud-status-icon');
            const statusText = document.getElementById('cloud-status-text');
            
            statusIcon.className = "fas fa-sync fa-spin text-blue-400 text-xs";
            statusText.innerText = "Salvando...";
            statusText.className = "bg-blue-900/50 text-blue-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider";

            dashboardRef.set({
                tools: tools,
                projects: projects,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
                // Sucesso
                statusIcon.className = "fas fa-cloud-check text-emerald-400 text-xs";
                statusText.innerText = "Sincronizado";
                statusText.className = "bg-emerald-900/50 text-emerald-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider";
            }).catch((error) => {
                console.error("Erro ao salvar:", error);
                statusIcon.className = "fas fa-exclamation-triangle text-red-400 text-xs";
                statusText.innerText = "Erro na Nuvem";
                statusText.className = "bg-red-900/50 text-red-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider";
                alert("Erro de permissão no Firebase. Certifique-se de que as regras do Firestore estão no 'Modo de Teste' (allow read, write: if true;).");
            });
        }

        // Função para Buscar os dados do Firebase ao iniciar a página
        function loadFromCloud() {
            dashboardRef.get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    tools = data.tools || [];
                    projects = data.projects || [];
                    
                    if (projects.length > 0) activeProjectIdx = 0;
                } else {
                    // Se o documento não existe ainda, inicializa vazio.
                    tools = [];
                    projects = [];
                }
                
                // Remove a tela de carregamento e desenha a interface
                document.getElementById('cloud-loader').classList.add('hidden-loader');
                document.getElementById('cloud-status-text').innerText = "Sincronizado";
                document.getElementById('cloud-status-text').className = "bg-emerald-900/50 text-emerald-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider";
                document.getElementById('cloud-status-icon').className = "fas fa-cloud text-emerald-400 text-xs";

                renderTools();
                renderProjects();
            }).catch((error) => {
                console.error("Erro ao carregar do Firebase:", error);
                document.getElementById('cloud-loader').innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i>
                    <p class="text-slate-300 font-medium tracking-wide">Erro de Permissão no Firebase</p>
                    <p class="text-slate-400 text-sm mt-2 text-center max-w-md">Vá no Firebase Console > Firestore Database > Rules.<br>Altere as regras para modo de teste (allow read, write: if true;) e publique.</p>
                `;
            });
        }

        // ==========================================
        // 3. LÓGICA DA INTERFACE (Renderização e Ações)
        // ==========================================
        
        function renderTools() {
            const container = document.getElementById('tools-list');
            if (!container) return;
            container.innerHTML = '';
            tools.forEach((t, i) => {
                container.innerHTML += `
                    <div class="group relative">
                        <a href="${t.url}" target="_blank" class="w-full text-left p-3 rounded-xl bg-[#0F172A] border border-slate-700/50 hover:border-purple-500 transition-all flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-purple-500/10 flex items-center justify-center shrink-0 group-hover:bg-purple-500 transition-colors">
                                <i class="fas fa-wrench text-purple-400 group-hover:text-white text-xs"></i>
                            </div>
                            <span class="font-medium text-slate-200 text-xs truncate">${t.name}</span>
                        </a>
                        <div class="absolute right-1 top-1/2 -translate-y-1/2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg z-10">
                            <button onclick="event.preventDefault(); event.stopPropagation(); openToolModal(${i})" class="p-1.5 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="event.preventDefault(); event.stopPropagation(); deleteTool(${i})" class="p-1.5 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
        }

        function renderProjects() {
            const container = document.getElementById('project-list');
            if (!container) return;
            container.innerHTML = '';
            
            if (projects.length === 0) activeProjectIdx = null;

            projects.forEach((p, i) => {
                const isActive = i === activeProjectIdx;
                container.innerHTML += `
                    <div class="group relative">
                        <button onclick="selectProject(${i})" class="w-full text-left p-3 md:p-4 rounded-xl bg-[#0F172A] border ${isActive ? 'active-project shadow-lg shadow-blue-500/10' : 'border-slate-700/50 opacity-70'} hover:opacity-100 transition-all flex items-center gap-3 md:gap-4">
                            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-folder ${isActive ? 'text-blue-400' : 'text-slate-500'}"></i>
                            </div>
                            <div class="truncate">
                                <p class="font-medium text-slate-200 text-sm truncate">${p.name}</p>
                                <p class="text-[10px] text-slate-500 truncate">${p.subtitle || ' '}</p>
                            </div>
                        </button>
                        <div class="absolute right-2 top-2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg">
                            <button onclick="openProjectModal(${i})" class="p-1 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="deleteProject(${i})" class="p-1 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            updateCenter();
        }

        function selectProject(i) { activeProjectIdx = i; activeLinkIdx = null; renderProjects(); }

        function updateCenter() {
            const container = document.getElementById('links-list');
            const nameEl = document.getElementById('active-project-name');
            const subEl = document.getElementById('active-project-subtitle');
            
            if (activeProjectIdx === null || projects.length === 0 || !projects[activeProjectIdx]) {
                nameEl.innerText = 'Nenhum projeto selecionado';
                subEl.innerText = 'Crie um projeto para começar';
                container.innerHTML = '';
                activeLinkIdx = null;
                renderNotebook();
                return;
            }

            const p = projects[activeProjectIdx];
            nameEl.innerText = p.name;
            subEl.innerText = p.subtitle || '';
            container.innerHTML = '';
            
            if (!p.links || !Array.isArray(p.links)) p.links = [];

            if (p.links.length === 0) {
                 container.innerHTML = `<div class="text-center text-slate-500 text-xs mt-10">Este projeto não tem subprojetos.<br>Clique no botão verde (+) para adicionar.</div>`;
            }

            p.links.forEach((l, i) => {
                const isActiveLink = i === activeLinkIdx;
                container.innerHTML += `
                    <div class="group flex items-center justify-between p-4 bg-[#0F172A] rounded-xl border ${isActiveLink ? 'active-link' : 'border-slate-700'} hover:border-emerald-500 transition-all cursor-pointer" onclick="selectLink(${i})">
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            <div class="w-10 h-10 md:w-12 md:h-12 ${isActiveLink ? 'bg-emerald-500/20' : 'bg-slate-800'} rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <i class="fas fa-link ${isActiveLink ? 'text-emerald-400' : 'text-slate-400'}"></i>
                            </div>
                            <div class="truncate pr-4">
                                <p class="font-semibold text-sm ${isActiveLink ? 'text-emerald-400' : 'text-slate-200'} group-hover:text-emerald-400 truncate transition-colors">${l.title}</p>
                                <p class="text-[11px] md:text-xs text-slate-500 mt-1 truncate">${l.desc || ''}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 ml-2 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="${l.url}" target="_blank" onclick="event.stopPropagation()" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-blue-600 transition-colors"><i class="fas fa-external-link-alt text-[10px]"></i></a>
                            <button onclick="event.stopPropagation(); openLinkModal(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="event.stopPropagation(); deleteLink(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition-colors"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            renderNotebook();
        }

        function selectLink(i) { activeLinkIdx = i; updateCenter(); }

        function renderNotebook() {
            const container = document.getElementById('notebook-container');
            const addBtn = document.getElementById('add-note-btn');
            const titleSpan = document.getElementById('active-link-name');

            if (activeProjectIdx === null || activeLinkIdx === null || !projects[activeProjectIdx] || !projects[activeProjectIdx].links || !projects[activeProjectIdx].links[activeLinkIdx]) {
                container.innerHTML = `<div class="text-center text-slate-500 text-xs mt-10">Selecione um subprojeto (link) na coluna verde para abrir a caderneta.</div>`;
                addBtn.classList.add('hidden');
                titleSpan.innerText = "Nenhum subprojeto...";
                return;
            }

            const activeLink = projects[activeProjectIdx].links[activeLinkIdx];
            if (!activeLink.notebook || !Array.isArray(activeLink.notebook)) activeLink.notebook = [];

            titleSpan.innerText = activeLink.title || 'Caderneta';
            addBtn.classList.remove('hidden');
            container.innerHTML = '';

            if (activeLink.notebook.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 text-[11px] mt-10 italic">Caderneta vazia.<br>Clique no botão laranja (+) para adicionar.</div>`;
            } else {
                activeLink.notebook.forEach((note, i) => {
                    let icon = note.type === 'task' ? 'fa-check-square' : (note.type === 'reminder' ? 'fa-bell' : 'fa-align-left');
                    let urgencyBadge = note.urgency === 'high' ? `<span class="text-[9px] font-bold bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded uppercase tracking-wide">Urgente</span>` : '';
                    let importanceBadge = note.importance === 'high' ? `<span class="text-[9px] font-bold bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded uppercase tracking-wide">Importante</span>` : '';
                    let borderClass = 'border-slate-700/50';
                    if (note.urgency === 'high' && note.importance === 'high') borderClass = 'border-red-500/50';
                    else if (note.importance === 'high') borderClass = 'border-amber-500/50';

                    container.innerHTML += `
                        <div class="group relative p-3 bg-[#0F172A] border ${borderClass} rounded-xl hover:border-amber-500 transition-all flex flex-col gap-2">
                            <div class="flex items-start gap-3">
                                ${note.type === 'task' ? 
                                    `<button onclick="toggleNoteDone(${i})" class="mt-0.5 w-4 h-4 rounded border shrink-0 flex items-center justify-center transition-colors ${note.done ? 'bg-amber-500 border-amber-500' : 'border-slate-500'}">
                                        ${note.done ? '<i class="fas fa-check text-[#0F172A] text-[10px]"></i>' : ''}
                                    </button>` : `<i class="fas ${icon} text-slate-500 mt-1 text-xs shrink-0"></i>`
                                }
                                <div class="flex-1 min-w-0">
                                    <p class="text-[13px] leading-snug whitespace-pre-wrap break-words ${note.done ? 'line-through text-slate-500' : 'text-slate-300'}">${note.content}</p>
                                    <div class="flex gap-1.5 mt-2">${importanceBadge}${urgencyBadge}</div>
                                </div>
                            </div>
                            <div class="absolute right-2 top-2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-md border border-slate-600 shadow-md">
                                <button onclick="openNoteModal(${i})" class="p-1 text-slate-400 hover:text-amber-400"><i class="fas fa-edit text-[10px]"></i></button>
                                <button onclick="deleteNote(${i})" class="p-1 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                            </div>
                        </div>`;
                });
            }
        }

        // === MODAIS ===
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }

        function openToolModal(i = -1) {
            document.getElementById('edit-tool-index').value = i;
            if(i > -1) {
                document.getElementById('tool-name-input').value = tools[i].name;
                document.getElementById('tool-url-input').value = tools[i].url;
            } else {
                document.getElementById('tool-name-input').value = '';
                document.getElementById('tool-url-input').value = '';
            }
            document.getElementById('tool-modal').classList.replace('hidden', 'flex');
        }
        function saveTool() {
            const i = document.getElementById('edit-tool-index').value;
            const data = { name: document.getElementById('tool-name-input').value, url: document.getElementById('tool-url-input').value };
            if(i > -1) tools[i] = data; else tools.push(data);
            closeModal('tool-modal'); renderTools(); saveToCloud(); // <-- SALVA NA NUVEM
        }
        function deleteTool(i) { if(confirm('Excluir ferramenta?')) { tools.splice(i, 1); renderTools(); saveToCloud(); } }

        function openProjectModal(i = -1) {
            document.getElementById('edit-project-index').value = i;
            if(i > -1) {
                document.getElementById('proj-name-input').value = projects[i].name;
                document.getElementById('proj-sub-input').value = projects[i].subtitle;
            } else {
                document.getElementById('proj-name-input').value = '';
                document.getElementById('proj-sub-input').value = '';
            }
            document.getElementById('project-modal').classList.replace('hidden', 'flex');
        }
        function saveProject() {
            const i = document.getElementById('edit-project-index').value;
            const data = { name: document.getElementById('proj-name-input').value || 'Novo Projeto', subtitle: document.getElementById('proj-sub-input').value, links: i > -1 ? projects[i].links : [] };
            if(i > -1) projects[i] = data; else { projects.push(data); activeProjectIdx = projects.length - 1; }
            closeModal('project-modal'); renderProjects(); saveToCloud();
        }
        function deleteProject(i) { if(confirm('Excluir projeto?')) { projects.splice(i, 1); activeProjectIdx = projects.length > 0 ? 0 : null; renderProjects(); saveToCloud(); } }

        function openLinkModal(i = -1) {
            document.getElementById('edit-link-index').value = i;
            if(i > -1) {
                const l = projects[activeProjectIdx].links[i];
                document.getElementById('link-title-input').value = l.title;
                document.getElementById('link-url-input').value = l.url;
                document.getElementById('link-desc-input').value = l.desc;
            } else {
                document.getElementById('link-title-input').value = '';
                document.getElementById('link-url-input').value = '';
                document.getElementById('link-desc-input').value = '';
            }
            document.getElementById('link-modal').classList.replace('hidden', 'flex');
        }
        function saveLink() {
            const i = document.getElementById('edit-link-index').value;
            const data = { 
                title: document.getElementById('link-title-input').value || 'Novo Link', 
                url: document.getElementById('link-url-input').value, 
                desc: document.getElementById('link-desc-input').value,
                notebook: i > -1 ? projects[activeProjectIdx].links[i].notebook : []
            };
            if(i > -1) projects[activeProjectIdx].links[i] = data; 
            else { projects[activeProjectIdx].links.push(data); activeLinkIdx = projects[activeProjectIdx].links.length - 1; }
            closeModal('link-modal'); renderProjects(); saveToCloud();
        }
        function deleteLink(i) { if(confirm('Excluir subprojeto?')) { projects[activeProjectIdx].links.splice(i, 1); if(activeLinkIdx === i) activeLinkIdx = null; renderProjects(); saveToCloud(); } }

        function openNoteModal(i = -1) {
            document.getElementById('edit-note-index').value = i;
            if(i > -1) {
                const n = projects[activeProjectIdx].links[activeLinkIdx].notebook[i];
                document.getElementById('note-type').value = n.type;
                document.getElementById('note-urgency').value = n.urgency;
                document.getElementById('note-importance').value = n.importance;
                document.getElementById('note-content').value = n.content;
            } else {
                document.getElementById('note-type').value = 'task';
                document.getElementById('note-urgency').value = 'normal';
                document.getElementById('note-importance').value = 'normal';
                document.getElementById('note-content').value = '';
            }
            document.getElementById('note-modal').classList.replace('hidden', 'flex');
        }
        function saveNote() {
            const i = document.getElementById('edit-note-index').value;
            const content = document.getElementById('note-content').value;
            if(!content.trim()) return;
            const data = { 
                type: document.getElementById('note-type').value, urgency: document.getElementById('note-urgency').value, importance: document.getElementById('note-importance').value, content: content,
                done: i > -1 ? projects[activeProjectIdx].links[activeLinkIdx].notebook[i].done : false
            };
            if(i > -1) projects[activeProjectIdx].links[activeLinkIdx].notebook[i] = data; else projects[activeProjectIdx].links[activeLinkIdx].notebook.push(data);
            closeModal('note-modal'); renderNotebook(); saveToCloud();
        }
        function deleteNote(i) { if(confirm('Excluir anotação?')) { projects[activeProjectIdx].links[activeLinkIdx].notebook.splice(i, 1); renderNotebook(); saveToCloud(); } }
        function toggleNoteDone(i) { const note = projects[activeProjectIdx].links[activeLinkIdx].notebook[i]; note.done = !note.done; renderNotebook(); saveToCloud(); }

        // ==========================================
        // 4. INICIA O SISTEMA BUSCANDO DA NUVEM
        // ==========================================
        window.onload = loadFromCloud;

    </script>
</body>
</html>
