<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando | PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .active-project { border-color: #3b82f6 !important; background-color: #1e293b !important; opacity: 1 !important; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-[#0F172A] text-slate-200 flex flex-col">

    <header class="w-full px-6 py-4 flex justify-between items-center bg-[#1E293B] border-b border-slate-700/50 shadow-md z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-rocket text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">Painel de Comando</h1>
                <p class="text-slate-400 text-xs">Ecossistema PetLojas</p>
            </div>
        </div>
        <div class="text-right flex flex-col items-end gap-1">
            <div class="flex items-center gap-3">
                <span class="bg-slate-700 text-slate-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider">Status: Online</span>
            </div>
            <div class="text-xs text-slate-400">v4.0 • 4 Colunas Editáveis</div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-[1800px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <section class="lg:col-span-2 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-4 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Ferramentas</h3>
                <button onclick="openToolModal()" class="w-7 h-7 bg-purple-600 hover:bg-purple-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-purple-600/20">
                    <i class="fas fa-plus text-[10px]"></i>
                </button>
            </div>
            <div id="tools-list" class="p-3 flex-1 overflow-y-auto space-y-2"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Meus Projetos</h3>
                <button onclick="openProjectModal()" class="w-8 h-8 bg-blue-600 hover:bg-blue-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-blue-600/20">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>
            <div id="project-list" class="p-4 flex-1 overflow-y-auto space-y-3"></div>
        </section>

        <section class="lg:col-span-4 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-6 border-b border-slate-700/50 shrink-0 flex justify-between items-start">
                <div class="overflow-hidden">
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold uppercase tracking-wider">Projeto Ativo</span>
                    <h2 id="active-project-name" class="text-2xl font-bold text-white mt-2 truncate">---</h2>
                    <p id="active-project-subtitle" class="text-xs text-slate-400 mt-1 truncate">---</p>
                </div>
                <button onclick="openLinkModal()" class="w-10 h-10 bg-green-600 hover:bg-green-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-green-600/20 shrink-0 ml-2">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="links-list" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0">
                <h3 class="font-bold text-white flex items-center gap-2 text-sm">
                    <i class="fas fa-tasks text-blue-400"></i> Checklist Diário
                </h3>
            </div>
            <div class="p-5 flex-1 overflow-y-auto">
                <div id="checklist-container" class="space-y-3"></div>
            </div>
            <div class="p-4 bg-[#0F172A] border-t border-slate-700/50 shrink-0">
                <div class="relative">
                    <input type="text" id="new-task" placeholder="Nova tarefa..." class="w-full p-3 bg-[#1E293B] border border-slate-600 text-slate-200 text-sm rounded-xl focus:outline-none focus:border-blue-500">
                </div>
            </div>
        </section>
    </main>

    <div id="tool-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-sm p-6">
            <h2 id="tool-modal-title" class="text-xl font-bold text-white mb-6">Nova Ferramenta</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-tool-index">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome da Ferramenta</label>
                    <input type="text" id="tool-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Link de Acesso)</label>
                    <input type="text" id="tool-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500">
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('tool-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveTool()" class="px-6 py-2 bg-purple-600 text-white rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="project-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="project-modal-title" class="text-xl font-bold text-white mb-6">Novo Projeto</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-project-index">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome do Projeto</label>
                    <input type="text" id="proj-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Subtítulo / Descrição</label>
                    <input type="text" id="proj-sub-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500">
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('project-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveProject()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="link-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="link-modal-title" class="text-xl font-bold text-white mb-6">Novo Link</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-link-index">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Título do Link</label>
                    <input type="text" id="link-title-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Endereço)</label>
                    <input type="text" id="link-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Descrição Curta</label>
                    <input type="text" id="link-desc-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500">
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('link-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveLink()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold">Salvar Link</button>
            </div>
        </div>
    </div>

    <script>
        // === FERRAMENTAS GLOBAIS ===
        let tools = JSON.parse(localStorage.getItem('petlojas-v4-tools')) || [
            { name: "ChatGPT", url: "https://chat.openai.com" },
            { name: "GitHub", url: "https://github.com" }
        ];

        function renderTools() {
            const container = document.getElementById('tools-list');
            container.innerHTML = '';
            tools.forEach((t, i) => {
                container.innerHTML += `
                    <div class="group relative">
                        <a href="${t.url}" target="_blank" class="w-full text-left p-3 rounded-xl bg-[#0F172A] border border-slate-700/50 hover:border-purple-500 transition-all flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-purple-500/10 flex items-center justify-center shrink-0 group-hover:bg-purple-500 transition-colors">
                                <i class="fas fa-wrench text-purple-400 group-hover:text-white text-xs"></i>
                            </div>
                            <span class="font-medium text-slate-200 text-xs truncate">${t.name}</span>
                        </a>
                        <div class="absolute right-1 top-1/2 -translate-y-1/2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg z-10">
                            <button onclick="event.preventDefault(); event.stopPropagation(); openToolModal(${i})" class="p-1.5 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="event.preventDefault(); event.stopPropagation(); deleteTool(${i})" class="p-1.5 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            localStorage.setItem('petlojas-v4-tools', JSON.stringify(tools));
        }

        function openToolModal(i = -1) {
            document.getElementById('edit-tool-index').value = i;
            if(i > -1) {
                document.getElementById('tool-name-input').value = tools[i].name;
                document.getElementById('tool-url-input').value = tools[i].url;
                document.getElementById('tool-modal-title').innerText = "Editar Ferramenta";
            } else {
                document.getElementById('tool-name-input').value = '';
                document.getElementById('tool-url-input').value = '';
                document.getElementById('tool-modal-title').innerText = "Nova Ferramenta";
            }
            document.getElementById('tool-modal').classList.replace('hidden', 'flex');
        }

        function saveTool() {
            const i = document.getElementById('edit-tool-index').value;
            const data = { 
                name: document.getElementById('tool-name-input').value, 
                url: document.getElementById('tool-url-input').value 
            };
            if(i > -1) tools[i] = data; else tools.push(data);
            closeModal('tool-modal'); 
            renderTools();
        }

        function deleteTool(i) {
            if(confirm('Excluir ferramenta?')) { tools.splice(i, 1); renderTools(); }
        }

        // === PROJETOS E LINKS ===
        let projects = JSON.parse(localStorage.getItem('petlojas-v3-data')) || [
            { name: "CRM PetLojas", subtitle: "Gestão de Leads e Funil", links: [{title: "Repositório", url: "#", desc: "Acesso ao código fonte"}] }
        ];
        let activeIdx = 0;

        function renderProjects() {
            const container = document.getElementById('project-list');
            container.innerHTML = '';
            projects.forEach((p, i) => {
                const isActive = i === activeIdx;
                container.innerHTML += `
                    <div class="group relative">
                        <button onclick="selectProject(${i})" class="w-full text-left p-3 md:p-4 rounded-xl bg-[#0F172A] border ${isActive ? 'active-project shadow-lg shadow-blue-500/10' : 'border-slate-700/50 opacity-70'} hover:opacity-100 transition-all flex items-center gap-3 md:gap-4">
                            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-folder ${isActive ? 'text-blue-400' : 'text-slate-500'}"></i>
                            </div>
                            <div class="truncate">
                                <p class="font-medium text-slate-200 text-sm truncate">${p.name}</p>
                                <p class="text-[10px] text-slate-500 truncate">${p.subtitle || ''}</p>
                            </div>
                        </button>
                        <div class="absolute right-2 top-2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg">
                            <button onclick="openProjectModal(${i})" class="p-1 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="deleteProject(${i})" class="p-1 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            updateCenter();
            localStorage.setItem('petlojas-v3-data', JSON.stringify(projects));
        }

        function updateCenter() {
            const p = projects[activeIdx] || {name: 'Nenhum projeto', subtitle: '', links: []};
            document.getElementById('active-project-name').innerText = p.name;
            document.getElementById('active-project-subtitle').innerText = p.subtitle;
            
            const container = document.getElementById('links-list');
            container.innerHTML = '';
            p.links.forEach((l, i) => {
                container.innerHTML += `
                    <div class="group flex items-center justify-between p-4 bg-[#0F172A] rounded-xl border border-slate-700 hover:border-slate-500 transition-all">
                        <a href="${l.url}" target="_blank" class="flex items-center gap-4 flex-1 overflow-hidden">
                            <div class="w-10 h-10 md:w-12 md:h-12 bg-slate-800 rounded-lg flex items-center justify-center shrink-0 group-hover:bg-slate-700 transition-colors"><i class="fas fa-link text-slate-400 group-hover:text-white"></i></div>
                            <div class="truncate pr-4">
                                <p class="font-semibold text-sm text-slate-200 group-hover:text-white truncate">${l.title}</p>
                                <p class="text-[11px] md:text-xs text-slate-500 mt-1 truncate">${l.desc}</p>
                            </div>
                        </a>
                        <div class="flex gap-2 md:gap-3 ml-2 shrink-0">
                            <button onclick="openLinkModal(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="deleteLink(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition-colors"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                    </div>`;
            });
        }

        function selectProject(i) { activeIdx = i; renderProjects(); }

        function openProjectModal(i = -1) {
            document.getElementById('edit-project-index').value = i;
            if(i > -1) {
                document.getElementById('proj-name-input').value = projects[i].name;
                document.getElementById('proj-sub-input').value = projects[i].subtitle;
                document.getElementById('project-modal-title').innerText = "Editar Projeto";
            } else {
                document.getElementById('proj-name-input').value = '';
                document.getElementById('proj-sub-input').value = '';
                document.getElementById('project-modal-title').innerText = "Novo Projeto";
            }
            document.getElementById('project-modal').classList.replace('hidden', 'flex');
        }

        function openLinkModal(i = -1) {
            document.getElementById('edit-link-index').value = i;
            if(i > -1) {
                const l = projects[activeIdx].links[i];
                document.getElementById('link-title-input').value = l.title;
                document.getElementById('link-url-input').value = l.url;
                document.getElementById('link-desc-input').value = l.desc;
                document.getElementById('link-modal-title').innerText = "Editar Link";
            } else {
                document.getElementById('link-title-input').value = '';
                document.getElementById('link-url-input').value = '';
                document.getElementById('link-desc-input').value = '';
                document.getElementById('link-modal-title').innerText = "Novo Link";
            }
            document.getElementById('link-modal').classList.replace('hidden', 'flex');
        }

        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }

        function saveProject() {
            const i = document.getElementById('edit-project-index').value;
            const data = { name: document.getElementById('proj-name-input').value, subtitle: document.getElementById('proj-sub-input').value, links: i > -1 ? projects[i].links : [] };
            if(i > -1) projects[i] = data; else { projects.push(data); activeIdx = projects.length - 1; }
            closeModal('project-modal'); renderProjects();
        }

        function deleteProject(i) { if(confirm('Excluir projeto?')) { projects.splice(i, 1); activeIdx = 0; renderProjects(); } }

        function saveLink() {
            const i = document.getElementById('edit-link-index').value;
            const data = { title: document.getElementById('link-title-input').value, url: document.getElementById('link-url-input').value, desc: document.getElementById('link-desc-input').value };
            if(i > -1) projects[activeIdx].links[i] = data; else projects[activeIdx].links.push(data);
            closeModal('link-modal'); renderProjects();
        }

        function deleteLink(i) { if(confirm('Excluir link?')) { projects[activeIdx].links.splice(i, 1); renderProjects(); } }

        // === CHECKLIST ===
        let tasks = JSON.parse(localStorage.getItem('tasks-v3')) || [{text: 'Configurar painel V4', done: false}];
        function renderTasks() {
            const c = document.getElementById('checklist-container');
            c.innerHTML = '';
            tasks.forEach((t, i) => {
                c.innerHTML += `<div class="group flex items-start gap-3 p-3 bg-[#0F172A] border border-slate-700/50 rounded-xl cursor-pointer hover:border-slate-500 transition-colors" onclick="toggleTask(${i})">
                    <div class="mt-0.5 w-4 h-4 md:w-5 md:h-5 rounded border shrink-0 ${t.done ? 'bg-blue-500 border-blue-500 flex items-center justify-center' : 'border-slate-500'}">
                        ${t.done ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}
                    </div>
                    <span class="text-[13px] md:text-sm leading-tight ${t.done ? 'line-through text-slate-500' : 'text-slate-300'}">${t.text}</span>
                    <button onclick="event.stopPropagation(); deleteTask(${i})" class="ml-auto opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all p-1">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>`;
            });
            localStorage.setItem('tasks-v3', JSON.stringify(tasks));
        }
        function toggleTask(i) { tasks[i].done = !tasks[i].done; renderTasks(); }
        function deleteTask(i) { tasks.splice(i, 1); renderTasks(); }
        document.getElementById('new-task').onkeypress = (e) => { if(e.key==='Enter' && e.target.value) { tasks.push({text: e.target.value, done: false}); e.target.value=''; renderTasks(); } };

        // === INICIALIZAÇÃO ===
        renderTools();
        renderProjects(); 
        renderTasks();
    </script>
</body>
</html>
