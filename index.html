<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando | PetLojas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .active-project { border-color: #3b82f6 !important; background-color: #1e293b !important; opacity: 1 !important; }
        .active-link { border-color: #10b981 !important; background-color: #1e293b !important; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-[#0F172A] text-slate-200 flex flex-col">

    <header class="w-full px-6 py-4 flex justify-between items-center bg-[#1E293B] border-b border-slate-700/50 shadow-md z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-rocket text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">Painel de Comando</h1>
                <p class="text-slate-400 text-xs">Encontre tudo em um só lugar</p>
            </div>
        </div>
        <div class="text-right flex flex-col items-end gap-1">
            <div class="flex items-center gap-3">
                <span class="bg-slate-700 text-slate-300 text-[10px] px-2 py-1 rounded-md font-semibold uppercase tracking-wider">Status: Online</span>
            </div>
            <div class="text-xs text-slate-400">v5.1 • Dados Recuperados</div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-[1800px] mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden">
        
        <section class="lg:col-span-2 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-4 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Ferramentas</h3>
                <button onclick="openToolModal()" class="w-7 h-7 bg-purple-600 hover:bg-purple-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-purple-600/20">
                    <i class="fas fa-plus text-[10px]"></i>
                </button>
            </div>
            <div id="tools-list" class="p-3 flex-1 overflow-y-auto space-y-2"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Meus Projetos</h3>
                <button onclick="openProjectModal()" class="w-8 h-8 bg-blue-600 hover:bg-blue-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-blue-600/20">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>
            <div id="project-list" class="p-4 flex-1 overflow-y-auto space-y-3"></div>
        </section>

        <section class="lg:col-span-4 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-6 border-b border-slate-700/50 shrink-0 flex justify-between items-start">
                <div class="overflow-hidden">
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-bold uppercase tracking-wider">Projeto Ativo</span>
                    <h2 id="active-project-name" class="text-2xl font-bold text-white mt-2 truncate">---</h2>
                    <p id="active-project-subtitle" class="text-xs text-slate-400 mt-1 truncate">---</p>
                </div>
                <button onclick="openLinkModal()" class="w-10 h-10 bg-green-600 hover:bg-green-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-green-600/20 shrink-0 ml-2">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div id="links-list" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
        </section>

        <section class="lg:col-span-3 h-full flex flex-col bg-[#1E293B] rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden">
            <div class="p-5 border-b border-slate-700/50 shrink-0 flex justify-between items-center">
                <div class="overflow-hidden pr-2">
                    <h3 class="font-bold text-white flex items-center gap-2 text-sm truncate">
                        <i class="fas fa-book text-amber-500"></i> Caderneta
                    </h3>
                    <p id="active-link-name" class="text-[10px] text-slate-400 mt-1 truncate">Selecione um subprojeto...</p>
                </div>
                <button id="add-note-btn" onclick="openNoteModal()" class="w-8 h-8 bg-amber-600 hover:bg-amber-500 text-white rounded-full flex items-center justify-center transition-all shadow-lg shadow-amber-600/20 hidden shrink-0">
                    <i class="fas fa-plus text-xs"></i>
                </button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto">
                <div id="notebook-container" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="tool-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-sm p-6">
            <h2 id="tool-modal-title" class="text-xl font-bold text-white mb-6">Nova Ferramenta</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-tool-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome</label><input type="text" id="tool-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Link)</label><input type="text" id="tool-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-purple-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('tool-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveTool()" class="px-6 py-2 bg-purple-600 text-white rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="project-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="project-modal-title" class="text-xl font-bold text-white mb-6">Novo Projeto</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-project-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Nome do Projeto</label><input type="text" id="proj-name-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Subtítulo / Descrição</label><input type="text" id="proj-sub-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-blue-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('project-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveProject()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="link-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="link-modal-title" class="text-xl font-bold text-white mb-6">Novo Subprojeto (Link)</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-link-index">
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Título</label><input type="text" id="link-title-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL (Endereço)</label><input type="text" id="link-url-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
                <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Descrição Curta</label><input type="text" id="link-desc-input" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-green-500"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('link-modal')" class="px-4 py-2 text-slate-400">Cancelar</button>
                <button onclick="saveLink()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="note-modal" class="fixed inset-0 bg-[#0F172A]/90 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-[#1E293B] border border-slate-700 rounded-2xl w-full max-w-md p-6">
            <h2 id="note-modal-title" class="text-xl font-bold text-white mb-6">Nova Anotação</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-note-index">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Tipo</label>
                        <select id="note-type" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm">
                            <option value="task">Tarefa</option>
                            <option value="note">Texto Livre</option>
                            <option value="reminder">Lembrete</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Urgência</label>
                        <select id="note-urgency" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm">
                            <option value="normal">Normal</option>
                            <option value="high" class="text-red-400">Alta Urgência</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Importância</label>
                        <select id="note-importance" class="w-full p-2.5 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm">
                            <option value="normal">Normal</option>
                            <option value="high" class="text-amber-400">Alta Importância</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1">Conteúdo</label>
                    <textarea id="note-content" rows="3" class="w-full p-3 bg-[#0F172A] border border-slate-600 text-slate-200 rounded-lg outline-none focus:border-amber-500 text-sm resize-none"></textarea>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="closeModal('note-modal')" class="px-4 py-2 text-slate-400 text-sm">Cancelar</button>
                <button onclick="saveNote()" class="px-6 py-2 bg-amber-600 hover:bg-amber-500 text-white rounded-lg font-bold text-sm">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // MOTOR DE RECUPERAÇÃO AUTOMÁTICA DE DADOS
        // ==========================================
        
        let tools = [];
        let projects = [];
        let activeProjectIdx = 0;
        let activeLinkIdx = null;

        function checkAndRecoverData() {
            // 1. Recupera as Ferramentas (Coluna 0)
            let oldTools = localStorage.getItem('petlojas-v4-tools');
            let currentTools = localStorage.getItem('petlojas-v5-tools');
            
            if (oldTools && !currentTools) {
                tools = JSON.parse(oldTools);
                localStorage.setItem('petlojas-v5-tools', JSON.stringify(tools)); // Migrou
            } else if (currentTools) {
                tools = JSON.parse(currentTools);
            }

            // 2. Recupera os Projetos e Links (Colunas 1 e 2)
            let oldProjects = localStorage.getItem('petlojas-v3-data'); // Seus dados criados nas versoes anteriores estão aqui
            let currentProjects = localStorage.getItem('petlojas-v5-data');
            
            // Verifica se a gente PRECISA resgatar os dados antigos
            if (oldProjects && !localStorage.getItem('petlojas-migrated-to-v5')) {
                projects = JSON.parse(oldProjects);
                
                // Prepara os projetos antigos para aceitarem a caderneta nova
                projects.forEach(p => {
                    if(p.links) {
                        p.links.forEach(l => {
                            if(!l.notebook) l.notebook = [];
                        });
                    } else {
                        p.links = [];
                    }
                });

                // Confirma que resgatou e salva no novo formato!
                localStorage.setItem('petlojas-v5-data', JSON.stringify(projects));
                localStorage.setItem('petlojas-migrated-to-v5', 'true');
            } else if (currentProjects) {
                projects = JSON.parse(currentProjects);
            } else {
                // Caso seja uma pessoa abrindo pela 1ª vez sem nenhum dado antigo
                projects = [{ name: "CRM PetLojas", subtitle: "Gestão", links: [] }];
            }
        }

        // Executa o resgate imediatamente
        checkAndRecoverData();


        // === FUNÇÕES DE RENDERIZAÇÃO ===
        function renderTools() {
            const container = document.getElementById('tools-list');
            container.innerHTML = '';
            tools.forEach((t, i) => {
                container.innerHTML += `
                    <div class="group relative">
                        <a href="${t.url}" target="_blank" class="w-full text-left p-3 rounded-xl bg-[#0F172A] border border-slate-700/50 hover:border-purple-500 transition-all flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-purple-500/10 flex items-center justify-center shrink-0 group-hover:bg-purple-500 transition-colors">
                                <i class="fas fa-wrench text-purple-400 group-hover:text-white text-xs"></i>
                            </div>
                            <span class="font-medium text-slate-200 text-xs truncate">${t.name}</span>
                        </a>
                        <div class="absolute right-1 top-1/2 -translate-y-1/2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg z-10">
                            <button onclick="event.preventDefault(); event.stopPropagation(); openToolModal(${i})" class="p-1.5 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="event.preventDefault(); event.stopPropagation(); deleteTool(${i})" class="p-1.5 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            localStorage.setItem('petlojas-v5-tools', JSON.stringify(tools));
        }

        function renderProjects() {
            const container = document.getElementById('project-list');
            container.innerHTML = '';
            
            if(projects.length === 0) activeProjectIdx = null;

            projects.forEach((p, i) => {
                p.links.forEach(l => { if(!l.notebook) l.notebook = []; }); // Garante a caderneta
                const isActive = i === activeProjectIdx;
                container.innerHTML += `
                    <div class="group relative">
                        <button onclick="selectProject(${i})" class="w-full text-left p-3 md:p-4 rounded-xl bg-[#0F172A] border ${isActive ? 'active-project shadow-lg shadow-blue-500/10' : 'border-slate-700/50 opacity-70'} hover:opacity-100 transition-all flex items-center gap-3 md:gap-4">
                            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-500/10 flex items-center justify-center shrink-0">
                                <i class="fas fa-folder ${isActive ? 'text-blue-400' : 'text-slate-500'}"></i>
                            </div>
                            <div class="truncate">
                                <p class="font-medium text-slate-200 text-sm truncate">${p.name}</p>
                                <p class="text-[10px] text-slate-500 truncate">${p.subtitle || ''}</p>
                            </div>
                        </button>
                        <div class="absolute right-2 top-2 hidden group-hover:flex gap-1 bg-[#1e293b] p-1 rounded-lg border border-slate-600 shadow-lg">
                            <button onclick="openProjectModal(${i})" class="p-1 text-slate-400 hover:text-white"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="deleteProject(${i})" class="p-1 text-slate-400 hover:text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            updateCenter();
            localStorage.setItem('petlojas-v5-data', JSON.stringify(projects));
        }

        function selectProject(i) { activeProjectIdx = i; activeLinkIdx = null; renderProjects(); }

        function updateCenter() {
            if (activeProjectIdx === null || !projects[activeProjectIdx]) {
                document.getElementById('active-project-name').innerText = 'Nenhum projeto';
                document.getElementById('active-project-subtitle').innerText = '';
                document.getElementById('links-list').innerHTML = '';
                renderNotebook();
                return;
            }

            const p = projects[activeProjectIdx];
            document.getElementById('active-project-name').innerText = p.name;
            document.getElementById('active-project-subtitle').innerText = p.subtitle;
            
            const container = document.getElementById('links-list');
            container.innerHTML = '';
            p.links.forEach((l, i) => {
                const isActiveLink = i === activeLinkIdx;
                container.innerHTML += `
                    <div class="group flex items-center justify-between p-4 bg-[#0F172A] rounded-xl border ${isActiveLink ? 'active-link' : 'border-slate-700'} hover:border-emerald-500 transition-all cursor-pointer" onclick="selectLink(${i})">
                        <div class="flex items-center gap-4 flex-1 overflow-hidden">
                            <div class="w-10 h-10 md:w-12 md:h-12 ${isActiveLink ? 'bg-emerald-500/20' : 'bg-slate-800'} rounded-lg flex items-center justify-center shrink-0 transition-colors">
                                <i class="fas fa-link ${isActiveLink ? 'text-emerald-400' : 'text-slate-400'}"></i>
                            </div>
                            <div class="truncate pr-4">
                                <p class="font-semibold text-sm ${isActiveLink ? 'text-emerald-400' : 'text-slate-200'} group-hover:text-emerald-400 truncate transition-colors">${l.title}</p>
                                <p class="text-[11px] md:text-xs text-slate-500 mt-1 truncate">${l.desc}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 ml-2 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="${l.url}" target="_blank" onclick="event.stopPropagation()" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-blue-600 transition-colors"><i class="fas fa-external-link-alt text-[10px]"></i></a>
                            <button onclick="event.stopPropagation(); openLinkModal(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"><i class="fas fa-edit text-[10px]"></i></button>
                            <button onclick="event.stopPropagation(); deleteLink(${i})" class="w-8 h-8 rounded-lg flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition-colors"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            renderNotebook();
        }

        function selectLink(i) { activeLinkIdx = i; updateCenter(); }

        function renderNotebook() {
            const container = document.getElementById('notebook-container');
            const addBtn = document.getElementById('add-note-btn');
            const titleSpan = document.getElementById('active-link-name');

            if (activeLinkIdx === null || !projects[activeProjectIdx] || !projects[activeProjectIdx].links[activeLinkIdx]) {
                container.innerHTML = `<div class="text-center text-slate-500 text-xs mt-10">Selecione um subprojeto na coluna central.</div>`;
                addBtn.classList.add('hidden');
                titleSpan.innerText = "Selecione um subprojeto...";
                return;
            }

            const activeLink = projects[activeProjectIdx].links[activeLinkIdx];
            titleSpan.innerText = activeLink.title;
            addBtn.classList.remove('hidden');
            container.innerHTML = '';

            if (activeLink.notebook.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 text-[11px] mt-10 italic">Caderneta vazia. Clique no botão amarelo.</div>`;
            } else {
                activeLink.notebook.forEach((note, i) => {
                    let icon = note.type === 'task' ? 'fa-check-square' : (note.type === 'reminder' ? 'fa-bell' : 'fa-align-left');
                    let urgencyBadge = note.urgency === 'high' ? `<span class="text-[9px] font-bold bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded uppercase tracking-wide">Urgente</span>` : '';
                    let importanceBadge = note.importance === 'high' ? `<span class="text-[9px] font-bold bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded uppercase tracking-wide">Importante</span>` : '';
                    let borderClass = 'border-slate-700/50';
                    if (note.urgency === 'high' && note.importance === 'high') borderClass = 'border-red-500/50';
                    else if (note.importance === 'high') borderClass = 'border-amber-500/50';

                    container.innerHTML += `
                        <div class="group relative p-3 bg-[#0F172A] border ${borderClass} rounded-xl hover:border-amber-500 transition-all flex flex-col gap-2">
                            <div class="flex items-start gap-3">
                                ${note.type === 'task' ? 
                                    `<button onclick="toggleNoteDone(${i})" class="mt-0.5 w-4 h-
